name: Monthly Retrain

on:
  schedule:
    - cron: '0 8 1 * *'   # 8am UTC on the 1st of every month
  workflow_dispatch:        # also allows manual trigger from GitHub UI

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest data
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: python src/ingest/eia.py

      - name: Train model
        run: python src/forecast/train.py

      - name: Evaluate and promote
        run: python src/forecast/evaluate.py

      - name: Commit updated MLflow runs and forecast
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mlruns/ data/raw/latest_forecast.csv || true
          git diff --staged --quiet || git commit -m "chore: monthly retrain $(date +%Y-%m-%d)"
          git push
